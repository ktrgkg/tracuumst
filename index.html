        // ✅ CHECKSUM MST 10 SỐ CHUẨN GDT
        function validateMSTChecksum(mst) {
            const digits = mst.split('').map(Number);
            const weights = [2, 4, 8, 3, 7, 6, 5, 2, 4, 8]; // Trọng số chuẩn
            
            let total = 0;
            for (let i = 0; i < 10; i++) {
                let product = digits[i] * weights[i];
                total += product > 9 ? Math.floor(product / 10) + (product % 10) : product;
            }
            
            const remainder = total % 10;
            return remainder === 0;
        }

        // ✅ VALIDATE HOÀN CHỈNH
        function validateMST(mst) {
            const cleanMST = mst.replace(/\D/g, '');
            return cleanMST.length === 10 && 
                   cleanMST.startsWith('170') && 
                   validateMSTChecksum(cleanMST);
        }

            document.getElementById('errorMsg').style.display = 'none';
