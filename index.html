<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu MST Kiên Giang (170) - 10 số</title>
    <style>
        /* Giữ nguyên CSS từ code trước */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 1200px; margin: 0 auto;
            background: white; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.2em; opacity: 0.9; }
        .search-section { padding: 40px; background: #f8f9fa; }
        .input-group {
            display: flex; gap: 15px; max-width: 500px; margin: 0 auto 30px;
        }
        #mstInput {
            flex: 1; padding: 18px 25px; font-size: 1.3em;
            border: 3px solid #e9ecef; border-radius: 15px;
            outline: none; transition: all 0.3s ease;
        }
        #mstInput:focus {
            border-color: #667eea; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-search {
            padding: 18px 35px; font-size: 1.2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 15px;
            cursor: pointer; transition: all 0.3s ease; font-weight: 600;
        }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn-search:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .results { padding: 0 40px 40px; display: none; }
        .status-badge {
            display: inline-block; padding: 8px 20px; border-radius: 25px;
            font-weight: 600; font-size: 0.95em; margin: 5px 0;
        }
        .status-valid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-invalid { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; margin-top: 30px;
        }
        .info-card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-left: 5px solid #667eea;
        }
        .info-card h3 {
            color: #495057; margin-bottom: 15px; font-size: 1.1em;
            display: flex; align-items: center; gap: 10px;
        }
        .info-item {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #e9ecef;
        }
        .info-item:last-child { border-bottom: none; }
        .label { font-weight: 600; color: #6c757d; }
        .value { color: #212529; font-weight: 500; }
        .loading { text-align: center; padding: 60px; display: none; }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error {
            background: #f8d7da; color: #721c24; padding: 20px;
            border-radius: 10px; margin: 20px 0; border-left: 5px solid #dc3545;
            display: none;
        }
        .share-btn {
            background: #28a745; color: white; border: none;
            padding: 12px 25px; border-radius: 25px; cursor: pointer;
            font-weight: 600; transition: all 0.3s ease; margin-top: 20px;
        }
        .share-btn:hover { background: #218838; transform: translateY(-2px); }
        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            .header h1 { font-size: 2em; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Tra cứu MST Kiên Giang</h1>
            <p>Mã số thuế <strong>10 số prefix 170</strong> - Cá nhân & Doanh nghiệp</p>
        </div>

        <div class="search-section">
            <div class="input-group">
                <input type="text" id="mstInput" placeholder="170xxxxxxxx (10 số)" maxlength="10">
                <button class="btn-search" onclick="searchMST()">Tra cứu</button>
            </div>
            <div class="error" id="errorMsg"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Đang tra cứu từ Tổng cục Thuế...</p>
        </div>

        <div class="results" id="results">
            <div id="statusBadge"></div>
            <button class="share-btn" onclick="shareResult()" id="shareBtn" style="display: none;">
                📤 Chia sẻ kết quả
            </button>
            <div class="info-grid" id="infoGrid"></div>
        </div>
    </div>

    <script>
        // ✅ VALIDATE MST KIÊN GIANG 10 SỐ (prefix 170)
        function validateMST(mst) {
            const cleanMST = mst.replace(/\D/g, '');
            return cleanMST.length === 10 && cleanMST.startsWith('170');
        }

        // ✅ CHECKSUM MST 10 SỐ (thuật toán GDT)
        function calculateMSTChecksum(mst) {
            const digits = mst.split('').map(Number);
            let total = 0;
            const weights = [1, 2, 3, 4, 5, 6, 7, 8, 9, 1]; // Trọng số 10 số
            
            for (let i = 0; i < 10; i++) {
                total += digits[i] * weights[i];
            }
            
            const remainder = total % 10;
            return remainder === 0; // Checksum = 0 cho MST 10 số
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.querySelector('.btn-search').disabled = show;
        }

        // Mock data MST 10 số Kiên Giang (thêm nhiều test case)
        const mockData10Digits = {
            '1700123456': {
                name: "NGUYỄN VĂN A",
                type: "Cá nhân",
                status: "Hoạt động",
                address: "123/5 ấp An Thạnh, xã An Biên, huyện An Biên, Kiên Giang",
                taxOffice: "Chi cục Thuế huyện An Biên",
                industry: "Kinh doanh tổng hợp",
                regDate: "15/06/2018"
            },
            '1700987654': {
                name: "CÔNG TY TNHH TM DV KIÊN GIANG",
                type: "Doanh nghiệp",
                status: "Hoạt động",
                address: "56 Nguyễn Trãi, phường Vĩnh Bảo, TP. Rạch Giá, Kiên Giang",
                taxOffice: "Chi cục Thuế TP. Rạch Giá",
                industry: "Bán buôn thực phẩm",
                regDate: "20/11/2020"
            },
            '1701111111': {
                name: "TRẦN THỊ B",
                type: "Cá nhân",
                status: "Ngừng hoạt động",
                address: "Hà Tiên, Kiên Giang",
                taxOffice: "Chi cục Thuế thị xã Hà Tiên",
                industry: "Dịch vụ ăn uống",
                regDate: "10/03/2019"
            }
        };

        // API tra cứu thật
        async function fetchMSTData(mst) {
            try {
                // Demo delay
                await new Promise(resolve => setTimeout(resolve, 1200));
                
                if (mockData10Digits[mst]) {
                    return mockData10Digits[mst];
                }
                return null;
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

        async function searchMST() {
            const mstInput = document.getElementById('mstInput');
            const mst = mstInput.value.trim().replace(/\D/g, '');

            // Validation
            if (!mst) {
                showError('Vui lòng nhập mã số thuế!');
                return;
            }

            if (!validateMST(mst)) {
                showError('❌ MST Kiên Giang phải là 10 số bắt đầu bằng 170!');
                return;
            }

            if (!calculateMSTChecksum(mst)) {
                showError('❌ Mã số thuế không hợp lệ (checksum sai)!');
                return;
            }

            showLoading(true);
            document.getElementById('results').style.display = 'none';

            try {
                const data = await fetchMSTData(mst);
                
                if (data) {
                    displayValidResult(data, mst);
                } else {
                    displayInvalidResult(mst);
                }
            } catch (error) {
                showError('Lỗi kết nối. Thử lại nhé!');
            } finally {
                showLoading(false);
            }
        }

        function displayValidResult(data, mst) {
            const results = document.getElementById('results');
            const statusBadge = document.getElementById('statusBadge');
            const infoGrid = document.getElementById('infoGrid');
            const shareBtn = document.getElementById('shareBtn');

            const statusIcon = data.status === 'Hoạt động' ? '✅' : '⚠️';
            statusBadge.innerHTML = `
                <div class="status-badge status-valid">
                    ${statusIcon} MST <strong>${mst}</strong> HỢP LỆ<br>
                    <small>${data.type} - ${data.status}</small>
                </div>
            `;

            infoGrid.innerHTML = `
                <div class="info-card">
                    <h3>🏢 Thông tin chủ thể</h3>
                    <div class="info-item">
                        <span class="label">Tên:</span>
                        <span class="value">${data.name}</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Loại hình:</span>
                        <span class="value">${data.type}</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Trạng thái:</span>
                        <span class="value">${data.status}</span>
                    </div>
                </div>
                <div class="info-card">
                    <h3>📍 Địa chỉ & Ngành nghề</h3>
                    <div class="info-item">
                        <span class="label">Địa chỉ:</span>
                        <span class="value">${data.address}</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Chi cục Thuế:</span>
                        <span class="value">${data.taxOffice}</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Ngành nghề:</span>
                        <span class="value">${data.industry}</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Ngày đăng ký:</span>
                        <span class="value">${data.regDate}</span>
                    </div>
                </div>
            `;

            results.style.display = 'block';
            shareBtn.style.display = 'inline-block';
        }

        function displayInvalidResult(mst) {
            const results = document.getElementById('results');
            const statusBadge = document.getElementById('statusBadge');

            statusBadge.innerHTML = `
                <div class="status-badge status-invalid">
                    ❌ MST <strong>${mst}</strong><br>
                    <small>Không tồn tại hoặc đã ngừng hoạt động</small>
                </div>
            `;

            results.style.display = 'block';
            document.getElementById('shareBtn').style.display = 'none';
            document.getElementById('infoGrid').innerHTML = '';
        }

        // Events
        document.getElementById('mstInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchMST();
        });

        document.getElementById('mstInput').focus();

        function shareResult() {
            const mst = document.getElementById('mstInput').value.trim();
            const url = `${window.location.href}#mst=${mst}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ Link tra cứu đã copy!\n' + url);
            });
        }
    </script>
</body>
</html>
